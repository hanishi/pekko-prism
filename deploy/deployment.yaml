apiVersion: apps/v1
kind: Deployment
metadata:
  name: prism-proxy
  labels:
    app: prism-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prism-proxy
  template:
    metadata:
      labels:
        app: prism-proxy
    spec:
      # Must exceed the proxy's in-flight drain deadline (binding.terminate(10s)) so
      # SIGTERM -> graceful drain completes before the pod is killed.
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: prism-proxy
          image: prism-proxy:latest        # replace with your registry/tag
          imagePullPolicy: IfNotPresent
          args: ["/config/proxy.conf"]     # the mounted ConfigMap
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: prism-proxy-config
