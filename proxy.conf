# Example prism proxy config. Run:  ./run-proxy-server.sh proxy.conf
# Only overrides what differs from the defaults baked into application.conf.

prism.proxy {
  port   = 8080
  origin = "http://localhost:9001"
  accept = ["html", "xml"]   # html pages and VAST/XML

  rules = [
    # brand an asset host behind your own CDN
    { type = rewrite, from = "assets.vendor.com", to = "cdn.publisher.example" }

    # first-party proxy a tracker: capture the original URL, encode it into a fp endpoint
    { type = wrap-url
      anchor   = "https://tracker.example.com"
      template = "https://fp.publisher.example/collect?dest={enc}" }

    # inject an analytics tag before </head>
    { type = insert-before
      anchor = "</head>"
      html   = "<script src=\"/analytics.js\"></script>" }
  ]
}

# Tune the upstream pool for this deployment.
pekko.http.host-connection-pool {
  max-connections   = 128
  max-open-requests = 512
}
