# ---------------------------------------------------------------------------
# prism reverse proxy — configuration schema and defaults.
#
# Run the server with your own file:
#   ./run-proxy-server.sh proxy.conf
# or the standard Typesafe way:
#   java -Dconfig.file=proxy.conf -cp <cp> prism.ProxyServer
#
# Your file only needs to override what you change (origin + rules, usually);
# everything below is the fallback default.
# ---------------------------------------------------------------------------

prism.proxy {
  interface   = "0.0.0.0"
  port        = 8080
  origin      = "http://localhost:9001"   # the upstream this proxy fronts
  health-path = "/healthz"                # returns 200 without proxying
  metrics-path = "/metrics"               # Prometheus metrics; "" to disable
  reload = false                          # watch the config file and hot-reload rules on change

  # Content types to rewrite. "html", "xml", explicit "text/css"…, or "all".
  accept = ["html"]

  # Rewrite only HTML text content (skip tags/attrs/scripts/styles/comments).
  text-only = false

  # Serve HTTPS from a PKCS12 keystore (omit/enabled=false for plain HTTP).
  tls {
    enabled  = false
    keystore = ""
    password = ""
  }

  # Rules, applied in order. Each is one object with a `type`. Body rules rewrite the
  # response body; header rules rewrite the parsed response headers (not body text).
  #
  #   body:
  #   { type = rewrite,        from = "...", to = "..." }     literal swap (whole body)
  #   { type = rewrite-word,   from = "...", to = "..." }     whole-word swap
  #   { type = wrap-url,       anchor = "https://t...", template = "https://fp.../c?dest={enc}" }
  #   { type = insert-before,  anchor = "</head>", html = "..." }
  #   { type = insert-after,   anchor = "<body>",  html = "..." }
  #
  #   header:
  #   { type = cookie-flags,   http-only = true, secure = true, same-site = "Lax" }  # harden Set-Cookie
  #   { type = set-header,     name = "Content-Security-Policy", value = "default-src 'self'" }
  #   { type = strip-header,   name = "X-Powered-By" }
  rules = []

  # Request-side rules, applied to the outgoing request before it reaches the origin.
  # Supports set-header / strip-header (request headers) and rewrite / rewrite-word
  # (request body, gated by `accept`). cookie-flags is response-only and ignored here.
  request-rules = []
}

# Client pool toward the origin. Pekko's defaults (4 / 32) are a proxy bottleneck;
# these are a sane baseline. Override here or in your config file.
pekko.http.host-connection-pool {
  max-connections   = 64
  max-open-requests = 256
  min-connections   = 0
  idle-timeout      = 30 s
}

# Expose the client address so the proxy can set X-Forwarded-For.
pekko.http.server.remote-address-attribute = on
